  <text x="1075" y="352" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Stop</text>

  <rect x="866" y="422" width="310" height="234" rx="12" fill="#1A1A1D" stroke="#2A2A30"/>
  <text x="890" y="457" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Console</text>
  <rect x="890" y="480" width="262" height="120" rx="8" fill="#101011" stroke="#27272C"/>
  <text x="908" y="510" fill="#72D89F" font-family="Cascadia Code, Consolas, monospace" font-size="13">[13:24:02] hooked WebView</text>
  <text x="908" y="538" fill="#D7D7D2" font-family="Cascadia Code, Consolas, monospace" font-size="13">[13:24:05] loadUrl(...)</text>
  <text x="908" y="566" fill="#E1B967" font-family="Cascadia Code, Consolas, monospace" font-size="13">[13:24:10] detached</text>
  <rect x="890" y="614" width="190" height="34" rx="7" fill="#242428" stroke="#34343A"/>
  <text x="906" y="637" fill="#A2A29C" font-family="Segoe UI, Arial, sans-serif" font-size="13">{ "type": "ping" }</text>
  <rect x="1090" y="614" width="62" height="34" rx="7" fill="#242428" stroke="#34343A"/>
  <text x="1107" y="637" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="13">Post</text>
</svg>
