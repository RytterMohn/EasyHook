  <text x="218" y="56" fill="#A2A29C" font-family="Segoe UI, Arial, sans-serif" font-size="14">Android Frida IDE</text>

  <rect x="24" y="100" width="250" height="556" rx="12" fill="#161619" stroke="#2A2A30"/>
