  <text x="931" y="235" fill="#9EDDBA" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Attach</text>
  <rect x="1030" y="212" width="122" height="34" rx="7" fill="#242428" stroke="#34343A"/>
  <text x="1071" y="235" fill="#D7D7D2" font-family="Segoe UI, Arial, sans-serif" font-size="13">Spawn</text>
  <rect x="890" y="266" width="262" height="38" rx="7" fill="#242428" stroke="#34343A"/>
  <text x="906" y="290" fill="#D7D7D2" font-family="Segoe UI, Arial, sans-serif" font-size="13">com.example.app (18472)</text>
  <rect x="890" y="324" width="124" height="44" rx="8" fill="#22B573"/>
  <text x="936" y="352" fill="#07150F" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Run</text>
