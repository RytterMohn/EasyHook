  <text x="62" y="236" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">android-webview.js</text>
  <text x="62" y="256" fill="#9EDDBA" font-family="Segoe UI, Arial, sans-serif" font-size="12">examples/android-webview...</text>
  <rect x="46" y="284" width="206" height="60" rx="8" fill="#1A1A1D" stroke="#2A2A30"/>
  <text x="62" y="310" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">activity-onresume.js</text>
  <text x="62" y="330" fill="#A2A29C" font-family="Segoe UI, Arial, sans-serif" font-size="12">examples/activity...</text>
  <rect x="46" y="358" width="206" height="60" rx="8" fill="#1A1A1D" stroke="#2A2A30"/>
  <text x="62" y="384" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">native-open-trace.js</text>
  <text x="62" y="404" fill="#A2A29C" font-family="Segoe UI, Arial, sans-serif" font-size="12">examples/native...</text>

  <rect x="296" y="100" width="548" height="556" rx="12" fill="#0F1010" stroke="#2A2A30"/>
  <rect x="296" y="100" width="548" height="58" rx="12" fill="#18181B" stroke="#2A2A30"/>
  <text x="320" y="135" fill="#F0F0EE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Script Editor</text>
  <text x="728" y="135" fill="#A2A29C" font-family="Segoe UI, Arial, sans-serif" font-size="13">42 lines</text>
  <rect x="320" y="182" width="496" height="446" rx="8" fill="#111213" stroke="#242428"/>
  <text x="344" y="224" fill="#77776F" font-family="Cascadia Code, Consolas, monospace" font-size="15">1</text>
  <text x="382" y="224" fill="#72D89F" font-family="Cascadia Code, Consolas, monospace" font-size="15">Java.perform(function () {</text>
  <text x="344" y="258" fill="#77776F" font-family="Cascadia Code, Consolas, monospace" font-size="15">2</text>
  <text x="382" y="258" fill="#E8E6D9" font-family="Cascadia Code, Consolas, monospace" font-size="15">const WebView = Java.use(...);</text>
  <text x="344" y="292" fill="#77776F" font-family="Cascadia Code, Consolas, monospace" font-size="15">3</text>
  <text x="382" y="292" fill="#E1B967" font-family="Cascadia Code, Consolas, monospace" font-size="15">send({ event: 'hooked' });</text>
  <text x="344" y="326" fill="#77776F" font-family="Cascadia Code, Consolas, monospace" font-size="15">4</text>
  <text x="382" y="326" fill="#72D89F" font-family="Cascadia Code, Consolas, monospace" font-size="15">});</text>

