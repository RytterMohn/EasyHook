<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EasyHook interface overview</title>
  <desc id="desc">A diagram showing the main EasyHook interface areas: script library, script editor, Android target panel, run controls, and console.</desc>
  <rect width="1200" height="680" rx="18" fill="#111113"/>
  <rect x="24" y="24" width="1152" height="58" rx="10" fill="#151518" stroke="#2A2A30"/>
  <rect x="48" y="39" width="34" height="28" rx="7" fill="#22B573"/>
