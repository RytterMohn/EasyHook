<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyHook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">EH</div>
          <div>
            <h1>EasyHook</h1>
            <span id="appStatus">Idle</span>
          </div>
        </div>
        <div class="toolbar">
          <button id="newScriptButton" type="button">New</button>
          <button id="openScriptButton" type="button">Open</button>
          <button id="openFolderButton" type="button">Folder</button>
          <button id="saveScriptButton" type="button">Save</button>
          <button id="saveAsScriptButton" type="button">Save As</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <div class="panel-header">
            <h2>Scripts</h2>
            <button id="refreshScriptsButton" class="icon-button" type="button" title="Refresh scripts">Refresh</button>
          </div>
          <input id="scriptSearchInput" class="input" type="search" placeholder="Search scripts" />
          <div id="scriptFolderPath" class="muted path-label">No folder selected</div>
          <div id="scriptList" class="script-list"></div>
        </aside>

        <section class="editor-area">
          <div class="editor-header">
            <div>
              <h2 id="activeFileName">Untitled</h2>
              <span id="activeFilePath" class="muted">Unsaved script</span>
            </div>
            <div id="editorMeta" class="muted">0 lines</div>
          </div>
          <div class="editor-frame">
            <pre id="lineNumbers" aria-hidden="true">1</pre>
            <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          </div>
        </section>

        <aside class="run-panel">
          <section class="run-card">
            <div class="panel-header">
              <h2>Target</h2>
              <button id="refreshDevicesButton" type="button">Refresh</button>
            </div>

            <label class="field">
              <span>Android device</span>
              <select id="deviceSelect"></select>
            </label>
            <div id="androidDeviceHint" class="setup-note">
              Connect an Android device, start frida-server, then click Refresh.
            </div>

            <label class="field">
              <span>Mode</span>
              <select id="targetModeSelect">
                <option value="attach">Attach</option>
                <option value="spawn">Spawn</option>
              </select>
            </label>

            <label class="field" id="processField">
              <span>Running Android process</span>
              <input id="processSearchInput" class="input" type="search" placeholder="Filter package or PID" />
              <select id="processSelect" size="8"></select>
            </label>

            <label class="field hidden" id="spawnField">
              <span>Android package</span>
              <input id="spawnTargetInput" class="input" type="text" placeholder="com.example.app" />
            </label>

            <label class="field hidden" id="applicationField">
              <span>Installed apps</span>
              <input id="applicationSearchInput" class="input" type="search" placeholder="Filter installed apps" />
              <select id="applicationSelect" size="6"></select>
            </label>

            <label class="field">
              <span>Runtime</span>
              <select id="runtimeSelect">
                <option value="default">Default</option>
                <option value="qjs">QuickJS</option>
                <option value="v8">V8</option>
              </select>
            </label>

            <div class="run-actions">
              <button id="runButton" class="primary" type="button">Run</button>
              <button id="stopButton" class="danger" type="button" disabled>Stop</button>
            </div>
          </section>

          <section class="run-card log-card">
            <div class="panel-header">
              <h2>Console</h2>
              <button id="clearLogButton" type="button">Clear</button>
            </div>
            <div id="logOutput" class="log-output" role="log" aria-live="polite"></div>
            <div class="post-row">
              <input id="postMessageInput" class="input" type="text" placeholder='{"type":"ping"}' />
              <button id="postMessageButton" type="button" disabled>Post</button>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
